# /etc/nginx/sites-available/steam-bot
#
# Configuracion Nginx para Steam-Support-Bot en EC2 (Ubuntu).
# - Sirve los archivos estaticos del frontend en /
# - Hace proxy de /api/* hacia el proceso uvicorn (127.0.0.1:8000)
# - Mantiene SSE funcional desactivando buffering y subiendo timeouts
#
# Despues de copiar este archivo, activarlo con:
#   sudo ln -sf /etc/nginx/sites-available/steam-bot /etc/nginx/sites-enabled/steam-bot
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

upstream steam_bot_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Logs
    access_log /var/log/nginx/steam-bot.access.log;
    error_log  /var/log/nginx/steam-bot.error.log;

    # Tope de carga util (mensajes del usuario)
    client_max_body_size 2m;

    # Raiz de los estaticos. La instalacion estandar deja el repo en
    # /opt/steam-support-bot (ajustar si lo clonas en otra ruta).
    root /opt/steam-support-bot/webapp/static;
    index index.html;

    # SPA-friendly: cualquier ruta que no exista cae en index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Healthcheck directo al app (util para load balancers)
    location = /api/health {
        proxy_pass         http://steam_bot_app;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Endpoint SSE: NO bufferear, timeouts largos
    location /api/support/stream {
        proxy_pass             http://steam_bot_app;
        proxy_http_version     1.1;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_set_header       Connection "";

        # Imprescindible para Server-Sent Events
        proxy_buffering        off;
        proxy_cache            off;
        chunked_transfer_encoding on;
        proxy_read_timeout     1h;
        proxy_send_timeout     1h;
        add_header             X-Accel-Buffering no;
    }

    # Resto del API
    location /api/ {
        proxy_pass         http://steam_bot_app;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 5m;
    }
}
