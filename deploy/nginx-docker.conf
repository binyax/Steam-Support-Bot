# Nginx para el setup con docker-compose.
# Sirve los estaticos montados como volumen y hace proxy a app:8000.
# Importante para SSE: proxy_buffering off + timeouts largos.

upstream steam_bot_app {
    server app:8000;
    keepalive 32;
}

# Rate limit a nivel Nginx (defensa adicional a la del backend).
# zone=req:10m guarda hasta ~160k IPs; 10 req/s con burst de 20.
limit_req_zone $binary_remote_addr zone=req:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn:10m;

server {
    listen 80 default_server;
    server_name _;

    access_log /var/log/nginx/steam-bot.access.log;
    error_log  /var/log/nginx/steam-bot.error.log warn;

    # No revelar la version de Nginx
    server_tokens off;

    # Limites contra DoS de payload
    client_max_body_size 256k;
    client_body_timeout 10s;
    client_header_timeout 10s;

    # Cabeceras de seguridad (las mismas que el backend, redundancia)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Maximo 10 conexiones simultaneas por IP (anti slowloris/exhaustion)
    limit_conn conn 10;

    # Estaticos
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Healthcheck publico (no aplica rate limit)
    location = /api/health {
        proxy_pass         http://steam_bot_app;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        access_log off;
    }

    # SSE: NO bufferear, timeouts largos, rate limit estricto
    location /api/support/stream {
        # 1 req cada 6s con burst de 2 (mas restrictivo que la API normal)
        limit_req zone=req burst=20 nodelay;

        proxy_pass             http://steam_bot_app;
        proxy_http_version     1.1;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_set_header       Connection "";

        # SSE essentials
        proxy_buffering        off;
        proxy_cache            off;
        chunked_transfer_encoding on;
        proxy_read_timeout     120s;
        proxy_send_timeout     120s;
        add_header             X-Accel-Buffering no;
    }

    # Resto del API: rate limit + proxy
    location /api/ {
        limit_req zone=req burst=20 nodelay;

        proxy_pass         http://steam_bot_app;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # Bloquear archivos sensibles si por error se sirvieran
    location ~ /\.(env|git|ht) {
        deny all;
        return 404;
    }
    
    location ~ \.(py|pyc|txt|example)$ {
	deny all;
	return 404;
    }
}
